<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estante Pública</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="tela-login"> 
    <div class="login-card">
        <h1 class="logo-login">Estante Pública</h1>
        <h2>Bem-vindo de volta!</h2>
        <p>Escolha como deseja entrar:</p>

        <button class="btn-google" id="btn-google">
            <img src="biblioteca_pessoal/google.png" alt="Google" width="20">
            Entrar com Google
        </button>

        <div class="divisor">ou use seu e-mail pessoal</div>

        <div class="form-login">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
            
            <label>Senha</label>
            <input type="password" id="password" placeholder="Sua senha">
            
            <button class="btn-entrar" id="btn-login-email">Entrar na minha estante</button>
        </div>

        <p class="footer-login">Não tem uma conta? <a href="#">Criar agora</a></p>
    </div>

    <script type="module">
        // Importamos as funções que você já tem no auth.js
        import { loginGoogle } from "./auth.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const auth = getAuth();

        // 1. Ação do Botão do Google
        document.getElementById('btn-google').addEventListener('click', () => {
            loginGoogle(); 
        });

        // 2. Ação do Login por E-mail (Opcional, conforme seu formulário)
        document.getElementById('btn-login-email').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('password').value;

            if (!email || !senha) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, senha);
                window.location.href = "index.html"; // Vai para a estante se der certo
            } catch (error) {
                alert("Erro ao entrar: " + error.message);
            }
        });
    </script>
</body>
</html>
