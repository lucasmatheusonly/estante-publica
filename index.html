<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Estante Pública - Início</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<div class="logo">Estante Pública</div>
<nav>
<ul>
<li><a href="index.html">Início</a></li>
<li id="user-info"><a href="login.html">Entrar</a></li>
<li id="admin-link" style="display: none;"><a href="admin.html" style="color: #bc9585; font-weight: bold;">+ Adicionar</a></li>
</ul>
</nav>
</header>

<main>
<section class="hero">
<div class="container">
<h1>Sua biblioteca, seu mundo.</h1>
<p>Leitura em qualquer lugar.</p>
</div>
</section>

<section class="container">
<div class="controles-biblioteca">
<input type="text" id="input-pesquisa" placeholder="Pesquisar título ou autor..." onkeyup="filtrarLivros()">
<select id="filtro-genero" onchange="filtrarLivros()">
<option value="todos">Todos os Gêneros</option>
<option value="romance">Romance</option>
<option value="ficcao">Ficção</option>
<option value="fantasia">Fantasia</option>
<option value="misterio">Mistério</option>
<option value="terror">Terror</option>
<option value="nacionais">Nacionais</option>
<option value="estrangeiros">Estrangeiros</option>
<option value="suspense">Suspense</option>
<option value="biografia">Biografia</option>
</select>
</div>
</section>

<section class="estante-privada">
<div class="container">
<h2>Minha Estante</h2>
<div class="grade-livros" id="grade-livros">
<p style="text-align: center; width: 100%;">Carregando estante...</p>
</div>
</div>
</section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyA_dfKpa7zNWkN4PANH0QTfqzj9j9Gujm0",
authDomain: "estante-publica.firebaseapp.com",
projectId: "estante-publica",
storageBucket: "estante-publica.firebasestorage.app",
messagingSenderId: "190769635660",
appId: "1:190769635660:web:1474f27911f45dbd17efe9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 1. CARREGAR LIVROS IMEDIATAMENTE (Independente de login)
carregarEstanteRealTime();

// 2. MONITOR DE LOGIN
onAuthStateChanged(auth, (user) => {
const userInfo = document.getElementById('user-info');
const adminLink = document.getElementById('admin-link');

if (user) {
// Se estiver logado, mostra o e-mail e o botão sair
userInfo.innerHTML = `<span style="color:white; margin-right:10px;">${user.email.split('@')[0]}</span> <a href="#" onclick="fazerLogout()">Sair</a>`;

// Se for o seu e-mail de admin, mostra o botão "+ Adicionar"
if (user.email === "seu-email-admin@gmail.com") { // Coloque seu e-mail aqui
adminLink.style.display = "inline-block";
}
} else {
userInfo.innerHTML = `<a href="login.html">Entrar</a>`;
adminLink.style.display = "none";
}
});

// 3. FUNÇÃO DE BUSCA EM TEMPO REAL
function carregarEstanteRealTime() {
const grade = document.getElementById('grade-livros');
if (!grade) return;

onSnapshot(collection(db, "livros"), (snapshot) => {
grade.innerHTML = "";

if (snapshot.empty) {
grade.innerHTML = "<p>Nenhum livro disponível no momento.</p>";
return;
}

snapshot.forEach((doc) => {
const dados = doc.data();
const livroCard = document.createElement('div');
livroCard.className = 'livro-card';

livroCard.onclick = () => {
localStorage.setItem('tituloParaLer', dados.titulo);
window.location.href = 'leitura.html';
};

livroCard.innerHTML = `
<div class="capa-container">
<img src="${dados.capa || 'https://via.placeholder.com/150x200?text=Sem+Capa'}" alt="Capa">
</div>
<div class="livro-info">
<h3>${dados.titulo}</h3>
<p>${dados.autor || 'Autor desconhecido'}</p>
</div>
`;
grade.appendChild(livroCard);
});
});
}

// LOGOUT
window.fazerLogout = function() {
signOut(auth).then(() => {
window.location.reload();
});
};
</script>
</body>
</html>
